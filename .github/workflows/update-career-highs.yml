name: Update Career Highs

on:
  schedule:
    # 2:00 AM Pacific Time = 10:00 AM UTC (9:00 AM UTC during daylight saving)
    - cron: '0 10 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python update_career_highs.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add career_highs.bin
          if git diff --cached --quiet; then
            echo "No changes to career_highs.bin"
          else
            git commit -m "Auto-update career highs $(date -u +%Y-%m-%d)"
            git push
          fi
